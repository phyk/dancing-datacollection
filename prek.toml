[[repos]]
repo = "builtin"
hooks = [
  { "id" = "trailing-whitespace" },
  { "id" = "end-of-file-fixer" },
  { "id" = 'check-json' },
  { "id" = "check-toml" },
]

[[repos]]
repo = "https://github.com/FeryET/pre-commit-rust"
rev = "v1.2.1"
hooks = [{ "id" = "fmt" }, { "id" = "cargo-check" }, { "id" = "clippy" }]
